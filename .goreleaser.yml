version: 2
project_name: kush
before:
  hooks:
    - go mod download

builds:
  # Linux / FreeBSD cross-builds (no cgo)
  - id: client_nocgo
    dir: .
    main: .
    binary: kush
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.date={{.CommitDate}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - freebsd
    goarch:
      - amd64
      - arm64

  # macOS build (CGO enabled for proper openpty / notarization)
  - id: client_darwin
    dir: .
    main: .
    binary: kush
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.date={{.CommitDate}}
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64

release:
  prerelease: true

archives:
  - wrap_in_directory: true
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'


changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

nfpms:
  - package_name: kush
    vendor: "grimdork.net"
    maintainer: "Grimdork <github@grimdork.net>"
    homepage: "https://github.com/grimdork/kush"
    description: "A tiny custom shell written in Go"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: "/usr/bin"
    section: contrib
    priority: extra
    contents:
      - src: LICENSE
        dst: "/usr/share/doc/kush/LICENSE"
      - src: README.md
        dst: "/usr/share/doc/kush/README.md"

# Publish a Homebrew formula into a tap repository. Goreleaser will create or update the formula
# in the specified repository (e.g. grimdork/homebrew-tools). Adjust repository/name if you prefer
# a different tap (like homebrew-kush).
brews:
  - name: kush
    repository:
      owner: grimdork
      name: homebrew-tools
    commit_author:
      name: Grimdork
      email: github@grimdork.net
    homepage: "https://github.com/grimdork/kush"
    description: "kush — small interactive shell"
    license: MIT
    test: |
      system "#{bin}/kush", "--version"

signs:
  - id: gpg-sign
    cmd: gpg
    args:
      - --batch
      - --pinentry-mode
      - loopback
      - --local-user
      - "{{ .Env.GPG_FINGERPRINT }}"
      - --output
      - "${signature}"
      - --detach-sign
      - "${artifact}"
    artifacts: binary
