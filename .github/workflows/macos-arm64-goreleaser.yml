name: Build & Release (macOS arm64)

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  goreleaser-macos-arm64:
    name: Build & Release macOS arm64
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Prepare SDKROOT
        id: sdk
        run: |
          echo "SDKROOT=$(xcrun --show-sdk-path)" >> $GITHUB_ENV

      - name: Map secret -> GITHUB_TOKEN
        run: |
          echo "GITHUB_TOKEN=${{ secrets.GORELEASER_TOKEN }}" >> $GITHUB_ENV

      - name: Run goreleaser (macOS arm64)
        uses: goreleaser/goreleaser-action@v4
        with:
          args: release --config .goreleaser.yml --skip-publish --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CGO_ENABLED: '1'
          CC: clang
          GOOS: darwin
          GOARCH: arm64
          SDKROOT: ${{ env.SDKROOT }}
          # Optional secrets you may want to set for signing/notarization:
          # GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          # GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}

      - name: Upload macOS artifacts to release
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const tag = process.env.GITHUB_REF.replace('refs/tags/','');
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            let release = null;
            for (let i = 0; i < 30; i++) {
              try {
                release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
                break;
              } catch (e) {
                await new Promise(r => setTimeout(r, 10000));
              }
            }
            if (!release) core.setFailed('Release not found after waiting');
            const distDir = 'dist';
            if (!fs.existsSync(distDir)) {
              core.setFailed(`dist directory not found: ${distDir}`);
            }
            const files = fs.readdirSync(distDir);
            for (const file of files) {
              const filePath = path.join(distDir, file);
              const stats = fs.statSync(filePath);
              const headers = { 'content-type': 'application/octet-stream', 'content-length': stats.size };
              const stream = fs.createReadStream(filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.data.id,
                name: file,
                data: stream,
                headers,
              });
              core.info(`Uploaded ${file}`);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
